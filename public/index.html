<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Splitter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:wght@400;700&family=Work+Sans:wght@400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <main class="card">
    <p class="overline">Utility / PDF Tools</p>
    <h1 class="display">PDF<br />SPLITTER</h1>
    <p class="lede">
      Turn one very tall PDF page — like a full-page screenshot — into several
      normal pages. Leave the page count empty to auto-split at A4 height.
    </p>

    <form id="split-form" novalidate>
      <div class="field">
        <label class="label" for="pdf">PDF File</label>
        <input type="file" id="pdf" name="pdf" accept="application/pdf" required />
      </div>

      <div class="field">
        <label class="label" for="pages">Number of Pages (Optional)</label>
        <input type="number" id="pages" name="pages" min="1" step="1" placeholder="AUTO (A4 HEIGHT)" />
        <p class="helper">
          Empty = automatically split so each page is roughly A4 tall.
        </p>
      </div>

      <button type="submit" id="submit-btn" class="btn-primary">Split PDF</button>

      <div id="progress" class="progress hidden" aria-hidden="true">
        <div class="progress-bar"></div>
      </div>
    </form>

    <div id="status" class="status" role="status" aria-live="polite"></div>
    <div id="result" class="result hidden"></div>
  </main>

  <script src="/app.js"></script>
</body>

</html>
