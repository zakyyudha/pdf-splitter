<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Splitter</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="card">
      <h1>PDF Splitter</h1>
      <p class="subtitle">
        Turn one very tall PDF page (like a full-page screenshot) into several
        normal pages. Leave the page count empty to auto-split at A4 height.
      </p>

      <form id="split-form">
        <label class="field">
          <span class="label-text">PDF file</span>
          <input type="file" id="pdf" name="pdf" accept="application/pdf" required />
        </label>

        <label class="field">
          <span class="label-text">Number of pages (optional)</span>
          <input
            type="number"
            id="pages"
            name="pages"
            min="1"
            step="1"
            placeholder="Auto (A4 height)"
          />
          <span class="hint">
            Empty = automatically split so each page is roughly A4 tall.
          </span>
        </label>

        <button type="submit" id="submit-btn">Split PDF</button>
      </form>

      <div id="status" class="status" role="status" aria-live="polite"></div>
      <div id="result" class="result hidden"></div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
